services:
  db:
    image: postgres:latest
    restart: always
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: xicovon # The PostgreSQL user (useful to connect to the database)
      POSTGRES_PASSWORD: DqaFaR2e23qA@ # The PostgreSQL password (useful to connect to the database)
      POSTGRES_DB: default_database # The PostgreSQL default database (automatically created at first launch)
    volumes:
      # In this example, we share the folder `db-data` in our root repository, with the default PostgreSQL data path.
      # It means that every time the repository is modifying the data inside
      # of `/var/lib/postgresql/data/`, automatically the change will appear in `db-data`.
      # You don't need to create the `db-data` folder. Docker Compose will do it for you.
      - /media/musicapp/db-data/:/var/lib/postgresql/data/
    
  music-app:
    image: xicovon/music-app:latest
    container_name: music-app
    ports:
      - '${PROD_PORT:-3737}:3737'
    depends_on:
      - db
    environment:
      NODE_ENV: production
      ALLOWED_ORIGINS: '${ALLOWED_ORIGINS:-https://xicovon.xyz}'
    volumes:
      - /media/music:/app/music:rw
      - /media/musicapp/ffmpeg.exe:/app/ffmpeg.exe:rw
      - /media/musicapp/ffprobe.exe:/app/ffprobe.exe:rw
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: '${PROD_MEMORY_LIMIT:-1G}'
          cpus: '${PROD_CPU_LIMIT:-1.0}'
        reservations:
          memory: '${PROD_MEMORY_RESERVATION:-256M}'
          cpus: '${PROD_CPU_RESERVATION:-0.1}'
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp
    networks:
      - cloudflared_tunnel-net

networks:
  cloudflared_tunnel-net:
    driver: bridge
    external: true
